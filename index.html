<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EagleEye 终极监控</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; }
        input, button { padding: 10px; font-size: 16px; border-radius: 5px; }
        input { background: #2d2d2d; color: #fff; border: 1px solid #555; width: 200px; }
        button { background: #0e639c; color: white; border: none; cursor: pointer; }
        video {
            width: 100%;
            max-width: 1280px;
            background: #000;
            border-radius: 8px;
            transform: scaleX(-1); /* 水平镜像，修正左右反向观感 */
        }
        #logs { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; font-family: monospace; color: #0f0; line-height: 1.4; }
        .log-warn { color: #ffcc00; }
        .log-sys { color: #00ccff; }
    </style>
</head>
<body>
    <h2>EagleEye 虚拟 AI 云台</h2>
    <div class="controls">
        <input type="text" id="ipInput" placeholder="开发板 IP" value="192.168.31.222">
        <button onclick="startWebRTC()">连接监控</button>
    </div>
    <video id="videoPlayer" autoplay playsinline muted></video>
    <div id="logs"><b>[系统日志]</b><br></div>

    <script>
        let pc;
        let ws;
        let pendingCandidates = [];
        let statsTimer = null;
        let wsPingTimer = null;
        let statsTick = 0;
        let clockSyncTick = 0;
        let hasClockOffset = false;
        let clockOffsetMs = 0;
        let latestSenderPipelineMs = 0;
        const frameTimingMap = new Map();
        const FRAME_TIMING_TTL_MS = 6000;
        const MAX_FRAME_TIMING_CACHE = 600;
        const e2eStats = {
            count: 0,
            sumMs: 0,
            minMs: Number.POSITIVE_INFINITY,
            maxMs: 0,
            emaMs: 0,
            senderPipelineSumMs: 0
        };
        const log = (msg, type='') => {
            const l = document.getElementById('logs');
            l.innerHTML += `<span class="${type}">> ${msg}</span><br>`;
            l.scrollTop = l.scrollHeight;
        };

        // 仅过滤出私网 IPv4 候选，避免 mDNS/IPv6 在开发板侧不可解析导致建链失败
        function isGoodIp(candidateStr) {
            const m = candidateStr.match(/(\d{1,3}\.){3}\d{1,3}/);
            if (!m) return false;
            const ip = m[0];
            if (ip.startsWith("10.")) return true;
            if (ip.startsWith("192.168.")) return true;
            const parts = ip.split('.').map(Number);
            if (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) return true;
            return false;
        }

        function cleanupPeer() {
            pendingCandidates = [];
            statsTick = 0;
            clockSyncTick = 0;
            hasClockOffset = false;
            clockOffsetMs = 0;
            latestSenderPipelineMs = 0;
            frameTimingMap.clear();
            e2eStats.count = 0;
            e2eStats.sumMs = 0;
            e2eStats.minMs = Number.POSITIVE_INFINITY;
            e2eStats.maxMs = 0;
            e2eStats.emaMs = 0;
            e2eStats.senderPipelineSumMs = 0;
            lastStats.timestamp = 0;
            lastStats.bytesReceived = 0;
            lastStats.framesReceived = 0;
            lastStats.framesDecoded = 0;
            lastStats.framesDropped = 0;
            lastStats.freezeCount = 0;
            lastStats.pliCount = 0;
            lastStats.nackCount = 0;
            lastStats.packetsLost = 0;
            if (statsTimer) {
                clearInterval(statsTimer);
                statsTimer = null;
            }
            if (wsPingTimer) {
                clearInterval(wsPingTimer);
                wsPingTimer = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function logSdpSummary(tag, sdp) {
            if (!sdp) {
                log(`${tag} SDP 为空`, "log-warn");
                return;
            }
            const lines = sdp.split(/\r\n|\n/).filter(Boolean);
            const mVideo = lines.find(l => l.startsWith("m=video")) || "m=video <missing>";
            const rtpmap = lines.filter(l => l.startsWith("a=rtpmap:"));
            const fmtp = lines.filter(l => l.startsWith("a=fmtp:"));
            const h26x = rtpmap.filter(l => /H265|HEVC|H264/i.test(l));
            log(`[${tag}] ${mVideo}`, "log-sys");
            if (h26x.length > 0) {
                log(`[${tag}] rtpmap: ${h26x.join(" | ")}`, "log-sys");
            } else {
                log(`[${tag}] 未发现 H26x rtpmap，当前 rtpmap 数量=${rtpmap.length}`, "log-warn");
            }
            if (fmtp.length > 0) {
                log(`[${tag}] fmtp: ${fmtp.join(" | ")}`, "log-sys");
            }
        }

        function bindVideoDebug(video) {
            if (video.dataset.debugBound === "1") return;
            video.dataset.debugBound = "1";
            const events = ["playing", "stalled", "error"];
            for (const evt of events) {
                video.addEventListener(evt, () => {
                    const err = video.error ? ` code=${video.error.code}` : "";
                    log(`[video:${evt}] readyState=${video.readyState} size=${video.videoWidth}x${video.videoHeight}${err}`, evt === "error" || evt === "stalled" ? "log-warn" : "log-sys");
                });
            }
        }

        function pruneFrameTimingCache() {
            const nowMs = Date.now();
            for (const [key, value] of frameTimingMap) {
                if ((nowMs - value.recvMs) > FRAME_TIMING_TTL_MS) {
                    frameTimingMap.delete(key);
                }
            }
            while (frameTimingMap.size > MAX_FRAME_TIMING_CACHE) {
                const oldestKey = frameTimingMap.keys().next().value;
                frameTimingMap.delete(oldestKey);
            }
        }

        function handleFrameTimingMessage(msg) {
            const rtpTsRaw = Number(msg.rtp_ts);
            const captureRealtimeUs = Number(msg.capture_realtime_us);
            const senderPipelineUs = Number(msg.sender_pipeline_us);
            if (!Number.isFinite(rtpTsRaw) || !Number.isFinite(captureRealtimeUs)) {
                return;
            }
            const rtpTs = (rtpTsRaw >>> 0);
            const senderPipelineMs = Number.isFinite(senderPipelineUs) ? (senderPipelineUs / 1000.0) : 0;
            if (senderPipelineMs > 0) {
                latestSenderPipelineMs = senderPipelineMs;
            }
            frameTimingMap.set(rtpTs, {
                captureRealtimeUs: captureRealtimeUs,
                senderPipelineMs: senderPipelineMs,
                recvMs: Date.now()
            });
            pruneFrameTimingCache();
        }

        function handleLatencyPongMessage(msg) {
            const clientSendMs = Number(msg.client_send_ms);
            const serverRecvUs = Number(msg.server_recv_us);
            const serverSendUs = Number(msg.server_send_us);
            if (!Number.isFinite(clientSendMs) || !Number.isFinite(serverRecvUs) || !Number.isFinite(serverSendUs)) {
                return;
            }
            const clientRecvMs = Date.now();
            const rttMs = Math.max(0, clientRecvMs - clientSendMs);
            const serverMidMs = (serverRecvUs + serverSendUs) / 2000.0;
            const estimatedOffsetMs = serverMidMs - (clientSendMs + rttMs * 0.5);
            if (!hasClockOffset) {
                clockOffsetMs = estimatedOffsetMs;
                hasClockOffset = true;
            } else {
                clockOffsetMs = clockOffsetMs * 0.9 + estimatedOffsetMs * 0.1;
            }
            clockSyncTick++;
            if (clockSyncTick % 10 === 1) {
                log(`[E2E] 时钟同步 RTT=${rttMs.toFixed(1)}ms offset=${clockOffsetMs.toFixed(1)}ms`, "log-sys");
            }
        }

        function sendLatencyPing() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: "latency_ping",
                client_send_ms: String(Date.now())
            }));
        }

        function startClockSync() {
            if (wsPingTimer) {
                clearInterval(wsPingTimer);
                wsPingTimer = null;
            }
            sendLatencyPing();
            wsPingTimer = setInterval(sendLatencyPing, 2000);
        }

        function updateE2EStats(e2eMs, senderPipelineMs) {
            if (!Number.isFinite(e2eMs) || e2eMs < 0 || e2eMs > 5000) {
                return;
            }
            e2eStats.count++;
            e2eStats.sumMs += e2eMs;
            e2eStats.minMs = Math.min(e2eStats.minMs, e2eMs);
            e2eStats.maxMs = Math.max(e2eStats.maxMs, e2eMs);
            e2eStats.senderPipelineSumMs += Math.max(0, senderPipelineMs);
            if (e2eStats.emaMs <= 0) {
                e2eStats.emaMs = e2eMs;
            } else {
                e2eStats.emaMs = e2eStats.emaMs * 0.9 + e2eMs * 0.1;
            }

            if (e2eStats.count % 30 === 0) {
                const avgMs = e2eStats.sumMs / e2eStats.count;
                const senderAvgMs = e2eStats.senderPipelineSumMs / e2eStats.count;
                const receiverApproxMs = Math.max(0, avgMs - senderAvgMs);
                log(
                    `[E2E] avg=${avgMs.toFixed(1)}ms ema=${e2eStats.emaMs.toFixed(1)}ms min/max=${e2eStats.minMs.toFixed(1)}/${e2eStats.maxMs.toFixed(1)}ms | sender=${senderAvgMs.toFixed(1)}ms receiver≈${receiverApproxMs.toFixed(1)}ms`,
                    "log-sys"
                );
            }
        }

        function startRenderLatencyProbe(video) {
            if (video.dataset.latencyProbeBound === "1") return;
            if (typeof video.requestVideoFrameCallback !== "function") {
                log("浏览器不支持 requestVideoFrameCallback，无法逐帧测量端到端时延。", "log-warn");
                return;
            }
            video.dataset.latencyProbeBound = "1";
            const onVideoFrame = (_now, metadata) => {
                const rawRtp = metadata && Number.isFinite(metadata.rtpTimestamp)
                    ? Number(metadata.rtpTimestamp)
                    : null;
                if (rawRtp !== null && hasClockOffset) {
                    const rtpTs = (rawRtp >>> 0);
                    const frameMeta = frameTimingMap.get(rtpTs);
                    if (frameMeta) {
                        frameTimingMap.delete(rtpTs);
                        const captureServerMs = frameMeta.captureRealtimeUs / 1000.0;
                        const captureClientMs = captureServerMs - clockOffsetMs;
                        const renderClientMs = Date.now();
                        const e2eMs = renderClientMs - captureClientMs;
                        updateE2EStats(e2eMs, frameMeta.senderPipelineMs);
                    }
                }
                video.requestVideoFrameCallback(onVideoFrame);
            };
            video.requestVideoFrameCallback(onVideoFrame);
            log("已启用逐帧端到端时延测量（requestVideoFrameCallback + RTP 时间戳匹配）", "log-sys");
        }
        
        // 用于保存上一次的统计数据，以计算每秒增量
        let lastStats = {
            timestamp: 0,
            bytesReceived: 0,
            framesReceived: 0,
            framesDecoded: 0,
            framesDropped: 0,
            freezeCount: 0,
            pliCount: 0,
            nackCount: 0,
            packetsLost: 0
        };

        function startStatsPolling(peer, video) {
            if (statsTimer) {
                clearInterval(statsTimer);
                statsTimer = null;
            }
            
            log("已开启 WebRTC 统计监控（5秒摘要，异常即时告警）", "log-sys");
            
            statsTimer = setInterval(async () => {
                if (!peer || peer.connectionState === "closed") return;
                try {
                    const stats = await peer.getStats();
                    let inboundVideo = null;

                    stats.forEach((r) => {
                        if (r.type === "inbound-rtp" && (r.kind === "video" || r.mediaType === "video")) {
                            inboundVideo = r;
                        }
                    });

                    if (inboundVideo) {
                        const now = inboundVideo.timestamp;
                        const bytes = inboundVideo.bytesReceived || 0;
                        const rxFrames = inboundVideo.framesReceived || 0;
                        const decFrames = inboundVideo.framesDecoded || 0;
                        const dropFrames = inboundVideo.framesDropped || 0;
                        const freezes = inboundVideo.freezeCount || 0;
                        const pli = inboundVideo.pliCount || 0;
                        const nack = inboundVideo.nackCount || 0;
                        const lost = inboundVideo.packetsLost || 0;
                        const jitter = inboundVideo.jitter || 0;
                        const networkJitterMs = jitter * 1000.0;
                        
                        // 计算平均 Jitter Buffer 延迟 (单位: 毫秒)
                        const jbDelay = inboundVideo.jitterBufferDelay || 0;
                        const jbEmitted = inboundVideo.jitterBufferEmittedCount || 1;
                        const avgJitterBufferMs = (jbDelay / jbEmitted) * 1000.0;
                        const decodeAvgMs = (decFrames > 0 && inboundVideo.totalDecodeTime)
                            ? (inboundVideo.totalDecodeTime / decFrames) * 1000.0
                            : 0;
                        const estimatedE2EMs = latestSenderPipelineMs + avgJitterBufferMs + decodeAvgMs + 8.0;

                        // 计算与上一次统计的时间差 (单位: 秒)
                        const timeDiff = (now - lastStats.timestamp) / 1000;

                        if (lastStats.timestamp > 0 && timeDiff > 0) {
                            // 计算每秒实时增量 (Deltas)
                            const fpsRx = Math.round((rxFrames - lastStats.framesReceived) / timeDiff);
                            const fpsDec = Math.round((decFrames - lastStats.framesDecoded) / timeDiff);
                            const fpsDrop = Math.round((dropFrames - lastStats.framesDropped) / timeDiff);
                            const kbps = Math.round(((bytes - lastStats.bytesReceived) * 8) / 1000 / timeDiff);
                            const deltaPli = pli - lastStats.pliCount;
                            const deltaNack = nack - lastStats.nackCount;
                            const deltaLost = lost - lastStats.packetsLost;
                            const deltaFreeze = freezes - lastStats.freezeCount;

                            let warn = false;
                            // 构建核心诊断日志
                            let logMsg =
                                `[统计] 码率:${kbps}kbps | FPS(收/解/丢): ${fpsRx}/${fpsDec}/${fpsDrop}` +
                                ` | Jitter:${networkJitterMs.toFixed(1)}ms JB:${avgJitterBufferMs.toFixed(1)}ms` +
                                ` | E2E估算:${estimatedE2EMs.toFixed(1)}ms`;
                            let logType = "log-sys";

                            // 异常诊断告警规则
                            if (fpsRx > 0 && fpsDec === 0) {
                                logMsg += ` | 解码停滞`;
                                logType = "log-warn";
                                warn = true;
                            } else if (fpsDrop > 0) {
                                logMsg += ` | 丢帧(+${fpsDrop})`;
                                logType = "log-warn";
                                warn = true;
                            }
                            
                            if (deltaPli > 0 || deltaNack > 0 || deltaLost > 0) {
                                logMsg += ` | 网络异常: 丢包(+${deltaLost}) NACK(+${deltaNack}) PLI(+${deltaPli})`;
                                logType = "log-warn";
                                warn = true;
                            }

                            if (deltaFreeze > 0) {
                                logMsg += ` | 冻结(+${deltaFreeze})`;
                                logType = "log-warn";
                                warn = true;
                            }

                            statsTick++;
                            if (warn || statsTick % 5 === 0) {
                                log(logMsg, logType);
                            }
                        }

                        // 更新上一次的记录
                        lastStats = {
                            timestamp: now,
                            bytesReceived: bytes,
                            framesReceived: rxFrames,
                            framesDecoded: decFrames,
                            framesDropped: dropFrames,
                            freezeCount: freezes,
                            pliCount: pli,
                            nackCount: nack,
                            packetsLost: lost
                        };
                    }
                } catch (err) {
                    log(`getStats 失败: ${err.message || err}`, "log-warn");
                }
            }, 1000); // 1秒轮询一次
        }

        function checkH265Support() {
            const caps = RTCRtpReceiver.getCapabilities && RTCRtpReceiver.getCapabilities('video');
            if (!caps || !caps.codecs) return;
            const hasH265 = caps.codecs.some(c => {
                const mt = (c.mimeType || '').toLowerCase();
                return mt === 'video/h265' || mt === 'video/hevc';
            });
            if (!hasH265) {
                log("当前浏览器可能不支持 WebRTC H.265，握手可能失败。建议用支持 HEVC 的浏览器/版本。", "log-warn");
            }
        }

        async function startWebRTC() {
            cleanupPeer();
            checkH265Support();
            bindVideoDebug(document.getElementById('videoPlayer'));

            const ip = document.getElementById('ipInput').value;
            log(`正在连接 WebSocket: ws://${ip}:8080 ...`, "log-sys");
            ws = new WebSocket(`ws://${ip}:8080`);

            ws.onopen = () => {
                log("WebSocket 连接成功，等待开发板发送 H.265 Offer...", "log-sys");
                startClockSync();
            };
            ws.onerror = (e) => log(`WebSocket 错误: ${e.type || 'unknown'}`, "log-warn");
            ws.onclose = () => {
                if (wsPingTimer) {
                    clearInterval(wsPingTimer);
                    wsPingTimer = null;
                }
                log("WebSocket 已关闭。", "log-warn");
            };
            
            ws.onmessage = async (event) => {
                let msg;
                try {
                    msg = JSON.parse(event.data);
                } catch (err) {
                    log(`解析信令消息失败: ${err.message || err}`, "log-warn");
                    return;
                }

                if (msg.type === "frame_timing") {
                    handleFrameTimingMessage(msg);
                    return;
                }
                if (msg.type === "latency_pong") {
                    handleLatencyPongMessage(msg);
                    return;
                }

                if (msg.type === 'offer') {
                    try {
                        log("收到开发板的 Offer，正在握手...", "log-sys");
                        pc = new RTCPeerConnection();
                        pc.onconnectionstatechange = () => log(`连接状态: ${pc.connectionState}`, pc.connectionState === "failed" || pc.connectionState === "disconnected" ? "log-warn" : "log-sys");

                        pc.onicecandidate = (e) => {
                            if (e.candidate && e.candidate.sdpMid && isGoodIp(e.candidate.candidate)) {
                                ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate.candidate, mid: e.candidate.sdpMid }));
                            }
                        };

                        pc.oniceconnectionstatechange = () => {
                            const s = pc.iceConnectionState;
                            if (s === "failed" || s === "disconnected") {
                                log(`ICE 状态: ${s}`, "log-warn");
                            }
                        };

                        pc.ontrack = (e) => {
                            log("WebRTC 视频通道已打通，正在播放 H.265 画面。", "log-sys");
                            
                            // 【核心修复 2】强制将 Jitter Buffer 延迟降为 0，相当于 GStreamer 的 sync=false
                            if (e.receiver && 'playoutDelayHint' in e.receiver) {
                                e.receiver.playoutDelayHint = 0;
                                log("已设置 playoutDelayHint=0", "log-sys");
                            }

                            const v = document.getElementById('videoPlayer');
                            v.srcObject = e.streams[0];
                            startRenderLatencyProbe(v);
                            v.play().catch((err) => log(`video.play() 失败: ${err.message || err}`, "log-warn"));
                            startStatsPolling(pc, v);
                        };

                        await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
                        logSdpSummary("RemoteOffer", msg.sdp);
                        for (const c of pendingCandidates) {
                            await pc.addIceCandidate(c);
                        }
                        pendingCandidates = [];

                        // 【核心修复 3】生成 Answer 时明确拒绝接收音频，斩断浏览器死等音频对齐的念想
                        const answer = await pc.createAnswer({
                            offerToReceiveAudio: false, 
                            offerToReceiveVideo: true
                        });
                        await pc.setLocalDescription(answer);
                        logSdpSummary("LocalAnswer", answer.sdp);
                        ws.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
                    } catch (err) {
                        log(`处理 Offer 失败: ${err.message || err}`, "log-warn");
                    }
                } 
                else if (msg.type === 'candidate') {
                    try {
                        if (isGoodIp(msg.candidate)) {
                            const candidate = new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.mid });
                            if (pc && pc.remoteDescription) {
                                await pc.addIceCandidate(candidate);
                            } else {
                                pendingCandidates.push(candidate);
                            }
                        }
                    } catch (err) {
                        log(`处理 Candidate 失败: ${err.message || err}`, "log-warn");
                    }
                }
            };
        }
    </script>
</body>
</html>
